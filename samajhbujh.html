<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamajhBujh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F5F5F7;
    color: #1D1D1F;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #F5F5F7;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(245,245,247,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left h1 {
    font-size: 20px;
    font-weight: 600;
    color: #1D1D1F;
    letter-spacing: -0.3px;
  }

  .header-left p {
    font-size: 12px;
    color: #86868B;
    margin-top: 1px;
    font-weight: 400;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #30D158;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  .chips-wrap {
    padding: 0 20px 12px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .chips-wrap::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: #E8E8ED;
    color: #1D1D1F;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
    flex-shrink: 0;
  }

  .chip.active {
    background: #1D1D1F;
    color: #FFFFFF;
  }

  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 8px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
  }
  .chat::-webkit-scrollbar { display: none; }

  .msg {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
    font-weight: 400;
    animation: pop 0.18s ease;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.97) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot {
    background: #FFFFFF;
    color: #1D1D1F;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
  }

  .msg.user {
    background: #1D1D1F;
    color: #FFFFFF;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
  }

  .msg.typing {
    background: #FFFFFF;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
    padding: 14px 18px;
  }

  .dots { display: flex; gap: 4px; align-items: center; }
  .dots span {
    width: 6px; height: 6px;
    background: #86868B;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  .suggestions {
    padding: 0 20px 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .suggestion {
    background: #FFFFFF;
    border: none;
    border-radius: 12px;
    padding: 11px 15px;
    font-size: 14px;
    color: #1D1D1F;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-weight: 400;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .suggestion:hover { background: #EBEBF0; }
  .suggestion:active { background: #E0E0E5; }

  .suggestion-arrow { color: #86868B; font-size: 16px; flex-shrink: 0; margin-left: 10px; }

  .ad {
    text-align: center;
    font-size: 11px;
    color: #86868B;
    padding: 4px 20px 2px;
  }
  .ad a { color: #0066CC; text-decoration: none; }

  .input-bar {
    padding: 10px 16px 20px;
    background: rgba(245,245,247,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: flex-end;
    gap: 10px;
  }

  .input-wrap {
    flex: 1;
    background: #FFFFFF;
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    border: 1px solid #E0E0E5;
    transition: border-color 0.15s;
  }

  .input-wrap:focus-within { border-color: #1D1D1F; }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    font-weight: 400;
    color: #1D1D1F;
    background: transparent;
    resize: none;
    min-height: 22px;
    max-height: 88px;
    line-height: 1.45;
    padding: 0;
  }

  textarea::placeholder { color: #86868B; }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #1D1D1F;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 1px;
  }

  .send-btn:hover { opacity: 0.82; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: #C7C7CC; cursor: not-allowed; }

  .send-btn svg { width: 15px; height: 15px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>SamajhBujh</h1>
      <p><span class="status-dot"></span>Honest advice, Indian context</p>
    </div>
  </header>

  <div class="chips-wrap">
    <button class="chip active" onclick="setTopic(this,'relationship')">Relationship</button>
    <button class="chip" onclick="setTopic(this,'family')">Family</button>
    <button class="chip" onclick="setTopic(this,'friendship')">Dosti</button>
    <button class="chip" onclick="setTopic(this,'workplace')">Office</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="quickAsk('Ghar waale meri relationship ke against hain. Kya karein?')">
      Ghar waale relationship ke against hain <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Best friend door ho gaya hai, kuch samajh nahi aata.')">
      Best friend door ho gaya hai <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Office mein colleague mera credit le leta hai.')">
      Colleague mera credit le leta hai <span class="suggestion-arrow">›</span>
    </button>
  </div>

  <div class="ad">Sponsored · <a href="https://shaadi.com" target="_blank">Shaadi.com</a> — Apna sahi partner dhundho</div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" placeholder="Apni baat likho…" rows="1"
        onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

</div>
<script>
const KEY = 'AIzaSyDWDZj56KijxKpdHFV1ifUHHmySnleAu5o';
const APIURL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${KEY}`;

let topic = 'relationship';
let busy = false;
let history = [];

const PROMPT = () => `Tu SamajhBujh hai — ek honest, caring bada bhai/behen jaise Indian life advisor.

Tu samajhta/samajhti hai:
- Joint families, arranged marriages, parental pressure
- "Log kya kahenge" culture
- Dosti ka drama, office politics
- Indian middle class ki real zindagi

Style:
- Hinglish mein baat kar (natural Hindi-English mix)
- Short aur to-the-point — max 3 paragraphs
- Honest reh, kind bhi reh
- Practical advice de jo Indian context mein actually kaam kare
- No Western therapy jargon

Current topic: ${topic}`;

function setTopic(el, t) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  topic = t;
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 88) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function quickAsk(t) {
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('input').value = t;
  send();
}

function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  if (type === 'typing') {
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else {
    d.innerHTML = text.replace(/\n/g, '<br>');
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addMsg(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });

  const typing = addMsg('', 'typing');

  try {
    const contents = history.length === 1
      ? [{ role: 'user', parts: [{ text: PROMPT() + '\n\n' + text }] }]
      : [
          { role: 'user', parts: [{ text: PROMPT() + '\n\n' + history[0].parts[0].text }] },
          { role: 'model', parts: [{ text: 'Haan, batao kya hua?' }] },
          ...history.slice(1)
        ];

    const res = await fetch(APIURL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents,
        generationConfig: { temperature: 0.85, maxOutputTokens: 350 }
      })
    });

    const data = await res.json();
    typing.remove();
    if (data.error) throw new Error(data.error.message);

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Dobara try karo yaar.';
    history.push({ role: 'model', parts: [{ text: reply }] });
    addMsg(reply, 'bot');

  } catch(e) {
    typing.remove();
    addMsg('Kuch gadbad ho gayi. Thodi der baad try karo.', 'bot');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
