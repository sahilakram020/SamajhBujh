<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamajhBujh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #F5F5F7;
    color: #1D1D1F;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .container {
    width: 100%;
    max-width: 620px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 14px 20px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(245,245,247,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #E5E5EA;
  }

  .header-left h1 {
    font-size: 18px;
    font-weight: 600;
    color: #1D1D1F;
    letter-spacing: -0.3px;
  }

  .header-left p {
    font-size: 11px;
    color: #86868B;
    margin-top: 1px;
  }

  .status-dot {
    width: 7px; height: 7px;
    background: #30D158;
    border-radius: 50%;
    display: inline-block;
    margin-right: 4px;
  }

  .new-chat-btn {
    background: #1D1D1F;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: opacity 0.15s;
  }
  .new-chat-btn:hover { opacity: 0.8; }

  /* CHIPS */
  .chips-wrap {
    padding: 10px 20px 8px;
    display: flex;
    gap: 7px;
    overflow-x: auto;
    scrollbar-width: none;
    background: #F5F5F7;
  }
  .chips-wrap::-webkit-scrollbar { display: none; }

  .chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    border: none;
    background: #E8E8ED;
    color: #1D1D1F;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: inherit;
    flex-shrink: 0;
  }
  .chip.active { background: #1D1D1F; color: #FFFFFF; }

  /* CHAT */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
  }
  .chat::-webkit-scrollbar { display: none; }

  /* DATE SEPARATOR */
  .date-sep {
    text-align: center;
    font-size: 11px;
    color: #86868B;
    margin: 4px 0;
  }

  .msg {
    max-width: 78%;
    padding: 11px 15px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
    animation: pop 0.18s ease;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.97) translateY(4px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .msg.bot {
    background: #FFFFFF;
    color: #1D1D1F;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
  }

  .msg.user {
    background: #1D1D1F;
    color: #FFFFFF;
    align-self: flex-end;
    border-bottom-right-radius: 5px;
  }

  .msg.typing {
    background: #FFFFFF;
    align-self: flex-start;
    border-bottom-left-radius: 5px;
    padding: 14px 18px;
  }

  .dots { display: flex; gap: 4px; align-items: center; }
  .dots span {
    width: 6px; height: 6px;
    background: #86868B;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* SUGGESTIONS */
  .suggestions {
    padding: 0 20px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .suggestion {
    background: #FFFFFF;
    border: none;
    border-radius: 12px;
    padding: 11px 15px;
    font-size: 14px;
    color: #1D1D1F;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-weight: 400;
    transition: background 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .suggestion:hover { background: #EBEBF0; }
  .suggestion-arrow { color: #86868B; font-size: 16px; flex-shrink: 0; margin-left: 10px; }

  /* AD */
  .ad {
    text-align: center;
    font-size: 11px;
    color: #86868B;
    padding: 4px 20px 2px;
  }
  .ad a { color: #0066CC; text-decoration: none; }

  /* INPUT */
  .input-bar {
    padding: 8px 16px 18px;
    background: rgba(245,245,247,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    display: flex;
    align-items: flex-end;
    gap: 10px;
    border-top: 1px solid #E5E5EA;
  }

  .input-wrap {
    flex: 1;
    background: #FFFFFF;
    border-radius: 22px;
    display: flex;
    align-items: flex-end;
    padding: 8px 14px;
    border: 1px solid #E0E0E5;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: #1D1D1F; }

  textarea {
    flex: 1;
    border: none;
    outline: none;
    font-size: 15px;
    font-family: inherit;
    color: #1D1D1F;
    background: transparent;
    resize: none;
    min-height: 22px;
    max-height: 88px;
    line-height: 1.45;
    padding: 0;
  }
  textarea::placeholder { color: #86868B; }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: #1D1D1F;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
    margin-bottom: 1px;
  }
  .send-btn:hover { opacity: 0.82; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: #C7C7CC; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; }

  /* HISTORY PANEL */
  .history-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 50;
    backdrop-filter: blur(2px);
  }
  .history-overlay.open { display: block; }

  .history-panel {
    position: fixed;
    top: 0; right: 0;
    width: 280px;
    height: 100dvh;
    background: #FFFFFF;
    z-index: 51;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    box-shadow: -4px 0 20px rgba(0,0,0,0.08);
  }
  .history-panel.open { transform: translateX(0); }

  .history-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid #E5E5EA;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-header h2 { font-size: 16px; font-weight: 600; }

  .close-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: none;
    background: #F5F5F7;
    color: #1D1D1F;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .history-item {
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.1s;
    margin-bottom: 4px;
  }
  .history-item:hover { background: #F5F5F7; }
  .history-item.active { background: #F0F0F5; }

  .history-item-title {
    font-size: 14px;
    font-weight: 500;
    color: #1D1D1F;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item-preview {
    font-size: 12px;
    color: #86868B;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 2px;
  }

  .history-item-time {
    font-size: 11px;
    color: #AEAEB2;
    margin-top: 2px;
  }

  .history-empty {
    text-align: center;
    color: #86868B;
    font-size: 14px;
    padding: 40px 20px;
  }

  .history-btn {
    background: none;
    border: none;
    color: #1D1D1F;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s;
  }
  .history-btn:hover { background: #E8E8ED; }
  .history-btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>SamajhBujh</h1>
      <p><span class="status-dot"></span>Honest advice, Indian context</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="history-btn" onclick="openHistory()" title="Chat history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 3h6l3 3 3-3h6v18H3z"/><line x1="3" y1="9" x2="21" y2="9"/>
        </svg>
      </button>
      <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
    </div>
  </header>

  <div class="chips-wrap">
    <button class="chip active" onclick="setTopic(this,'relationship')">Relationship</button>
    <button class="chip" onclick="setTopic(this,'family')">Family</button>
    <button class="chip" onclick="setTopic(this,'friendship')">Dosti</button>
    <button class="chip" onclick="setTopic(this,'workplace')">Office</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="quickAsk('Ghar waale meri relationship ke against hain. Kya karein?')">
      Ghar waale relationship ke against hain <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Best friend door ho gaya hai, kuch samajh nahi aata.')">
      Best friend door ho gaya hai <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Office mein colleague mera credit le leta hai.')">
      Colleague mera credit le leta hai <span class="suggestion-arrow">›</span>
    </button>
  </div>

  <div class="ad">Sponsored · <a href="https://shaadi.com" target="_blank">Shaadi.com</a> — Apna sahi partner dhundho</div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" placeholder="Apni baat likho…" rows="1"
        onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>

</div>

<!-- HISTORY PANEL -->
<div class="history-overlay" id="overlay" onclick="closeHistory()"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h2>Chat history</h2>
    <button class="close-btn" onclick="closeHistory()">✕</button>
  </div>
  <div class="history-list" id="historyList"></div>
</div>

<script>
const API_KEY = 'AIzaSyDWDZj56KijxKpdHFV1ifUHHmySnleAu5o';
const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;

let topic = 'relationship';
let busy = false;
let history = [];
let allChats = JSON.parse(localStorage.getItem('sb_chats') || '[]');
let currentChatId = null;

const SYSTEM = () => `You are SamajhBujh, an honest and caring Indian life advisor like a wise elder sibling (bada bhai/behen).

You deeply understand Indian social reality:
- Joint families and their politics
- Arranged marriages and parental pressure  
- "Log kya kahenge" culture
- Middle class Indian struggles
- Office politics, friendship drama

Your style:
- Reply in Hinglish (natural Hindi + English mix)
- Keep it short: max 3 short paragraphs
- Be honest but kind — give real advice, not just validation
- No Western therapy jargon
- Practical advice that works in Indian context
- Occasionally ask one thoughtful question

Current topic: ${topic}`;

function setTopic(el, t) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  topic = t;
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 88) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function quickAsk(t) {
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('input').value = t;
  send();
}

function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  if (type === 'typing') {
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else {
    d.innerHTML = text.replace(/\n/g, '<br>');
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function timeAgo(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Abhi';
  if (m < 60) return m + ' min pehle';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' ghante pehle';
  return Math.floor(h / 24) + ' din pehle';
}

function saveChat() {
  if (history.length === 0) return;
  const firstMsg = history[0].parts[0].text;
  const title = firstMsg.length > 40 ? firstMsg.slice(0, 40) + '…' : firstMsg;
  const lastMsg = history[history.length - 1].parts[0].text;

  if (currentChatId) {
    const idx = allChats.findIndex(c => c.id === currentChatId);
    if (idx > -1) {
      allChats[idx] = { ...allChats[idx], history: [...history], lastMsg, updatedAt: Date.now() };
    }
  } else {
    currentChatId = Date.now().toString();
    allChats.unshift({ id: currentChatId, title, history: [...history], lastMsg, createdAt: Date.now(), updatedAt: Date.now() });
  }
  localStorage.setItem('sb_chats', JSON.stringify(allChats));
}

function newChat() {
  saveChat();
  history = [];
  currentChatId = null;
  const chat = document.getElementById('chat');
  chat.innerHTML = '<div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>';
  document.getElementById('suggestions').style.display = 'flex';
  document.getElementById('input').value = '';
  closeHistory();
}

function loadChat(chatId) {
  saveChat();
  const c = allChats.find(x => x.id === chatId);
  if (!c) return;
  currentChatId = chatId;
  history = [...c.history];

  const chat = document.getElementById('chat');
  chat.innerHTML = '<div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>';
  document.getElementById('suggestions').style.display = 'none';

  history.forEach(m => {
    const type = m.role === 'user' ? 'user' : 'bot';
    addMsg(m.parts[0].text, type);
  });
  closeHistory();
}

function openHistory() {
  allChats = JSON.parse(localStorage.getItem('sb_chats') || '[]');
  const list = document.getElementById('historyList');

  if (allChats.length === 0) {
    list.innerHTML = '<div class="history-empty">Koi purani baat nahi mili.<br>Pehle kuch poochho!</div>';
  } else {
    list.innerHTML = allChats.map(c => `
      <div class="history-item ${c.id === currentChatId ? 'active' : ''}" onclick="loadChat('${c.id}')">
        <div class="history-item-title">${c.title}</div>
        <div class="history-item-preview">${c.lastMsg ? c.lastMsg.slice(0, 50) : ''}…</div>
        <div class="history-item-time">${timeAgo(c.updatedAt)}</div>
      </div>
    `).join('');
  }

  document.getElementById('overlay').classList.add('open');
  document.getElementById('historyPanel').classList.add('open');
}

function closeHistory() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('historyPanel').classList.remove('open');
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addMsg(text, 'user');
  history.push({ role: 'user', parts: [{ text }] });

  const typing = addMsg('', 'typing');

  try {
    // Build conversation with system context injected in first message
    const contents = history.map((m, i) => {
      if (i === 0 && m.role === 'user') {
        return { role: 'user', parts: [{ text: SYSTEM() + '\n\nUser: ' + m.parts[0].text }] };
      }
      return m;
    });

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents,
        generationConfig: {
          temperature: 0.85,
          maxOutputTokens: 400,
          topP: 0.9
        },
        safetySettings: [
          { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
          { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_MEDIUM_AND_ABOVE' },
          { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
        ]
      })
    });

    const data = await res.json();
    typing.remove();

    if (data.error) {
      console.error('API Error:', data.error);
      throw new Error(data.error.message);
    }

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) throw new Error('Empty response');

    history.push({ role: 'model', parts: [{ text: reply }] });
    addMsg(reply, 'bot');
    saveChat();

  } catch(e) {
    typing.remove();
    console.error('Error:', e);
    addMsg('Yaar, thoda network issue ho gaya. Ek baar phir try karo! 🙏', 'bot');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
