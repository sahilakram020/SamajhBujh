<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SamajhBujh</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: #F5F5F7; color: #1D1D1F; height: 100dvh; display: flex; flex-direction: column; align-items: center; }
  .container { width: 100%; max-width: 620px; height: 100dvh; display: flex; flex-direction: column; }

  header { padding: 14px 20px 10px; display: flex; align-items: center; justify-content: space-between; background: rgba(245,245,247,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #E5E5EA; }
  .header-left h1 { font-size: 18px; font-weight: 600; color: #1D1D1F; letter-spacing: -0.3px; }
  .header-left p { font-size: 11px; color: #86868B; margin-top: 1px; }
  .status-dot { width: 7px; height: 7px; background: #30D158; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .header-right { display: flex; gap: 8px; align-items: center; }

  .icon-btn { background: none; border: none; color: #1D1D1F; cursor: pointer; padding: 6px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: background 0.1s; }
  .icon-btn:hover { background: #E8E8ED; }
  .icon-btn svg { width: 20px; height: 20px; }

  .new-chat-btn { background: #1D1D1F; color: white; border: none; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 500; font-family: inherit; cursor: pointer; transition: opacity 0.15s; }
  .new-chat-btn:hover { opacity: 0.8; }

  .chips-wrap { padding: 10px 20px 8px; display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; background: #F5F5F7; }
  .chips-wrap::-webkit-scrollbar { display: none; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; border: none; background: #E8E8ED; color: #1D1D1F; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; flex-shrink: 0; }
  .chip.active { background: #1D1D1F; color: #FFFFFF; }

  .chat { flex: 1; overflow-y: auto; padding: 12px 20px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: none; }
  .chat::-webkit-scrollbar { display: none; }

  .msg { max-width: 78%; padding: 11px 15px; border-radius: 18px; font-size: 15px; line-height: 1.55; animation: pop 0.18s ease; }
  @keyframes pop { from { opacity: 0; transform: scale(0.97) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .msg.bot { background: #FFFFFF; color: #1D1D1F; align-self: flex-start; border-bottom-left-radius: 5px; }
  .msg.user { background: #1D1D1F; color: #FFFFFF; align-self: flex-end; border-bottom-right-radius: 5px; }
  .msg.typing { background: #FFFFFF; align-self: flex-start; border-bottom-left-radius: 5px; padding: 14px 18px; }

  .dots { display: flex; gap: 4px; align-items: center; }
  .dots span { width: 6px; height: 6px; background: #86868B; border-radius: 50%; animation: bounce 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  .suggestions { padding: 0 20px 8px; display: flex; flex-direction: column; gap: 6px; }
  .suggestion { background: #FFFFFF; border: none; border-radius: 12px; padding: 11px 15px; font-size: 14px; color: #1D1D1F; cursor: pointer; text-align: left; font-family: inherit; font-weight: 400; transition: background 0.1s; display: flex; align-items: center; justify-content: space-between; }
  .suggestion:hover { background: #EBEBF0; }
  .suggestion-arrow { color: #86868B; font-size: 16px; flex-shrink: 0; margin-left: 10px; }

  .ad { text-align: center; font-size: 11px; color: #86868B; padding: 4px 20px 2px; }
  .ad a { color: #0066CC; text-decoration: none; }

  .input-bar { padding: 8px 16px 18px; background: rgba(245,245,247,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); display: flex; align-items: flex-end; gap: 10px; border-top: 1px solid #E5E5EA; }
  .input-wrap { flex: 1; background: #FFFFFF; border-radius: 22px; display: flex; align-items: flex-end; padding: 8px 14px; border: 1px solid #E0E0E5; transition: border-color 0.15s; }
  .input-wrap:focus-within { border-color: #1D1D1F; }
  textarea { flex: 1; border: none; outline: none; font-size: 15px; font-family: inherit; color: #1D1D1F; background: transparent; resize: none; min-height: 22px; max-height: 88px; line-height: 1.45; padding: 0; }
  textarea::placeholder { color: #86868B; }

  .send-btn { width: 36px; height: 36px; border-radius: 50%; border: none; background: #1D1D1F; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; margin-bottom: 1px; }
  .send-btn:hover { opacity: 0.82; }
  .send-btn:active { transform: scale(0.93); }
  .send-btn:disabled { background: #C7C7CC; cursor: not-allowed; }
  .send-btn svg { width: 15px; height: 15px; }

  /* HISTORY PANEL */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 50; backdrop-filter: blur(2px); }
  .overlay.open { display: block; }
  .panel { position: fixed; top: 0; right: 0; width: 280px; height: 100dvh; background: #FFFFFF; z-index: 51; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.25s ease; box-shadow: -4px 0 20px rgba(0,0,0,0.08); }
  .panel.open { transform: translateX(0); }
  .panel-header { padding: 16px 16px 12px; border-bottom: 1px solid #E5E5EA; display: flex; align-items: center; justify-content: space-between; }
  .panel-header h2 { font-size: 16px; font-weight: 600; }
  .close-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: #F5F5F7; color: #1D1D1F; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .hlist { flex: 1; overflow-y: auto; padding: 8px; }
  .hitem { padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: background 0.1s; margin-bottom: 4px; }
  .hitem:hover { background: #F5F5F7; }
  .hitem.active { background: #F0F0F5; }
  .hitem-title { font-size: 14px; font-weight: 500; color: #1D1D1F; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hitem-preview { font-size: 12px; color: #86868B; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
  .hitem-time { font-size: 11px; color: #AEAEB2; margin-top: 2px; }
  .hempty { text-align: center; color: #86868B; font-size: 14px; padding: 40px 20px; line-height: 1.6; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-left">
      <h1>SamajhBujh</h1>
      <p><span class="status-dot"></span>Honest advice, Indian context</p>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="openHistory()" title="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 8v4l3 3"/><path d="M3.05 11a9 9 0 1 1 .5 4m-.5 5v-5h5"/>
        </svg>
      </button>
      <button class="new-chat-btn" onclick="newChat()">+ New chat</button>
    </div>
  </header>

  <div class="chips-wrap">
    <button class="chip active" onclick="setTopic(this,'relationship')">Relationship</button>
    <button class="chip" onclick="setTopic(this,'family')">Family</button>
    <button class="chip" onclick="setTopic(this,'friendship')">Dosti</button>
    <button class="chip" onclick="setTopic(this,'workplace')">Office</button>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="suggestion" onclick="quickAsk('Ghar waale meri relationship ke against hain. Kya karein?')">
      Ghar waale relationship ke against hain <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Best friend door ho gaya hai, kuch samajh nahi aata.')">
      Best friend door ho gaya hai <span class="suggestion-arrow">›</span>
    </button>
    <button class="suggestion" onclick="quickAsk('Office mein colleague mera credit le leta hai.')">
      Colleague mera credit le leta hai <span class="suggestion-arrow">›</span>
    </button>
  </div>

  <div class="ad">Sponsored · <a href="https://shaadi.com" target="_blank">Shaadi.com</a> — Apna sahi partner dhundho</div>

  <div class="input-bar">
    <div class="input-wrap">
      <textarea id="input" placeholder="Apni baat likho…" rows="1"
        onkeydown="handleKey(event)" oninput="resize(this)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- HISTORY -->
<div class="overlay" id="overlay" onclick="closeHistory()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2>Chat history</h2>
    <button class="close-btn" onclick="closeHistory()">✕</button>
  </div>
  <div class="hlist" id="hlist"></div>
</div>

<script>
// ✅ CORRECT Gemini API URL
const KEY = 'AIzaSyDWDZj56KijxKpdHFV1ifUHHmySnleAu5o';
const URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + KEY;

let topic = 'relationship';
let busy = false;
let msgs = []; // current chat messages
let currentId = null;
let allChats = [];

try { allChats = JSON.parse(localStorage.getItem('sb_chats') || '[]'); } catch(e) { allChats = []; }

const SYSTEM = () => `You are SamajhBujh, an honest and caring Indian life advisor like a wise elder sibling.

You deeply understand Indian social reality:
- Joint families, arranged marriages, parental pressure
- "Log kya kahenge" culture
- Middle class Indian struggles, office politics, friendship drama

Your style:
- Reply in Hinglish (natural Hindi + English mix)
- Keep it short — max 3 short paragraphs
- Be honest but kind
- No Western therapy jargon
- Give practical advice that works in Indian context

Current topic: ${topic}`;

function setTopic(el, t) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  topic = t;
}

function resize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 88) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function quickAsk(t) {
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('input').value = t;
  send();
}

function addMsg(text, type) {
  const chat = document.getElementById('chat');
  const d = document.createElement('div');
  d.className = 'msg ' + type;
  if (type === 'typing') {
    d.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';
  } else {
    d.innerHTML = text.replace(/\n/g, '<br>');
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function timeAgo(ts) {
  const m = Math.floor((Date.now() - ts) / 60000);
  if (m < 1) return 'Abhi';
  if (m < 60) return m + ' min pehle';
  const h = Math.floor(m / 60);
  if (h < 24) return h + ' ghante pehle';
  return Math.floor(h / 24) + ' din pehle';
}

function saveChat() {
  if (msgs.length === 0) return;
  const firstUser = msgs.find(m => m.role === 'user');
  if (!firstUser) return;
  const title = firstUser.parts[0].text.slice(0, 45) + (firstUser.parts[0].text.length > 45 ? '…' : '');
  const last = msgs[msgs.length - 1].parts[0].text;

  if (currentId) {
    const idx = allChats.findIndex(c => c.id === currentId);
    if (idx > -1) allChats[idx] = { ...allChats[idx], msgs: [...msgs], last, updatedAt: Date.now() };
  } else {
    currentId = Date.now().toString();
    allChats.unshift({ id: currentId, title, msgs: [...msgs], last, createdAt: Date.now(), updatedAt: Date.now() });
  }
  try { localStorage.setItem('sb_chats', JSON.stringify(allChats)); } catch(e) {}
}

function newChat() {
  saveChat();
  msgs = [];
  currentId = null;
  document.getElementById('chat').innerHTML = '<div class="msg bot">Namaste! Kya chal raha hai? Koi bhi baat karo — relationship, family, dosti, ya office. Seedha aur honest advice dunga. 🙏</div>';
  document.getElementById('suggestions').style.display = 'flex';
  document.getElementById('input').value = '';
  closeHistory();
}

function loadChat(id) {
  saveChat();
  const c = allChats.find(x => x.id === id);
  if (!c) return;
  currentId = id;
  msgs = [...c.msgs];
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  msgs.forEach(m => addMsg(m.parts[0].text, m.role === 'user' ? 'user' : 'bot'));
  document.getElementById('suggestions').style.display = 'none';
  closeHistory();
}

function openHistory() {
  try { allChats = JSON.parse(localStorage.getItem('sb_chats') || '[]'); } catch(e) {}
  const list = document.getElementById('hlist');
  if (allChats.length === 0) {
    list.innerHTML = '<div class="hempty">Koi purani baat nahi mili.<br>Pehle kuch poochho! 🙏</div>';
  } else {
    list.innerHTML = allChats.map(c => `
      <div class="hitem ${c.id === currentId ? 'active' : ''}" onclick="loadChat('${c.id}')">
        <div class="hitem-title">${c.title}</div>
        <div class="hitem-preview">${(c.last || '').slice(0, 50)}…</div>
        <div class="hitem-time">${timeAgo(c.updatedAt)}</div>
      </div>`).join('');
  }
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closeHistory() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('panel').classList.remove('open');
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;

  inp.value = '';
  inp.style.height = 'auto';
  document.getElementById('suggestions').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;
  busy = true;

  addMsg(text, 'user');
  msgs.push({ role: 'user', parts: [{ text }] });

  const typing = addMsg('', 'typing');

  try {
    // Build contents — inject system prompt into first user message
    const contents = msgs.map((m, i) => {
      if (i === 0 && m.role === 'user') {
        return { role: 'user', parts: [{ text: SYSTEM() + '\n\nUser ka message: ' + m.parts[0].text }] };
      }
      return { role: m.role, parts: m.parts };
    });

    const res = await fetch(URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: contents,
        generationConfig: {
          temperature: 0.85,
          maxOutputTokens: 400,
          topP: 0.9
        }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error?.message || 'API error ' + res.status);
    }

    const data = await res.json();
    typing.remove();

    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!reply) throw new Error('Empty reply');

    msgs.push({ role: 'model', parts: [{ text: reply }] });
    addMsg(reply, 'bot');
    saveChat();

  } catch(e) {
    typing.remove();
    console.error('SamajhBujh error:', e.message);
    addMsg('Yaar, ek minute network issue ho gaya — dobara try karo! 🙏', 'bot');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
